<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>BotWatch</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    width: 320px;
    background: #f9fafb;
    color: #111;
  }

  .header {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo { font-size: 16px; font-weight: 700; }
  .status { font-size: 11px; color: #6b7280; }

  .body { padding: 14px 16px; }

  .screen-name {
    font-size: 15px;
    font-weight: 700;
    color: #111;
    margin-bottom: 14px;
  }

  .field { margin-bottom: 10px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }

  input[type="number"],
  input[type="text"] {
    width: 100%;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 13px;
    color: #111;
    background: #fff;
    outline: none;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
  }

  input:focus { border-color: #3b82f6; }

  .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .checks {
    display: flex;
    gap: 14px;
    margin-bottom: 12px;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: #374151;
    cursor: pointer;
  }

  /* Scraped badge — green */
  .scraped-badge {
    display: inline-block;
    font-size: 10px;
    background: #dcfce7;
    color: #16a34a;
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 4px;
  }

  /* Estimated badge — yellow */
  .est-badge {
    display: inline-block;
    font-size: 10px;
    background: #fef9c3;
    color: #854d0e;
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 4px;
  }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 11px;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: background 0.15s;
    display: block;
  }

  .btn:disabled {
    background: #9ca3af;
    cursor: not-allowed;
  }

  .btn-primary {
    background: #3b82f6;
    color: #fff;
    margin-top: 8px;
  }

  .btn-primary:hover:not(:disabled) { background: #2563eb; }

  .btn-suggest {
    background: #f0f7ff;
    color: #3b82f6;
    border: 1px solid #bfdbfe;
  }

  .btn-suggest:hover { background: #dbeafe; }

  .btn-scrape {
    background: #fff;
    color: #374151;
    border: 1px solid #d1d5db;
    margin-bottom: 8px;
  }

  .btn-scrape:hover:not(:disabled) { background: #f3f4f6; }

  /* Suggest note */
  .suggest-note {
    font-size: 11px;
    color: #6b7280;
    margin: 6px 0 10px;
    line-height: 1.5;
    display: none;
  }

  /* Result box */
  .result {
    margin-top: 14px;
    border-radius: 8px;
    padding: 14px;
    border: 1px solid #ddd;
    background: #fff;
  }

  .result.fake { border-left: 4px solid #ef4444; }
  .result.real { border-left: 4px solid #22c55e; }

  .verdict-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .verdict { font-size: 18px; font-weight: 700; }
  .verdict.fake { color: #ef4444; }
  .verdict.real { color: #22c55e; }

  .confidence {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 100px;
    font-weight: 500;
  }

  .conf-high { background: #dcfce7; color: #16a34a; }
  .conf-med  { background: #fef9c3; color: #854d0e; }
  .conf-low  { background: #f3f4f6; color: #6b7280; }

  .score-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .bar-wrap {
    flex: 1;
    background: #e5e7eb;
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
  }

  .bar-fill { height: 100%; border-radius: 100px; }
  .bar-fill.fake { background: #ef4444; }
  .bar-fill.real { background: #22c55e; }

  .score-pct {
    font-size: 13px;
    font-weight: 700;
    min-width: 36px;
    text-align: right;
  }

  .signals {
    border-top: 1px solid #f0f0f0;
    padding-top: 8px;
    margin-top: 4px;
  }

  .signal-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    padding: 3px 0;
    color: #555;
  }

  .signal-val { font-weight: 600; color: #111; }

  /* Error box */
  .error-box {
    background: #fef2f2;
    border: 1px solid #fca5a5;
    color: #b91c1c;
    border-radius: 6px;
    padding: 10px;
    font-size: 12px;
    margin-top: 10px;
    display: none;
  }

  /* Footer note */
  .footer-note {
    font-size: 11px;
    color: #9ca3af;
    text-align: center;
    margin-top: 10px;
    line-height: 1.5;
  }

  /* Not on Twitter message */
  .not-twitter {
    padding: 24px 16px;
    text-align: center;
    color: #6b7280;
    font-size: 13px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="header">
  <span class="logo">BotWatch</span>
  <span class="status" id="status">Ready</span>
</div>

<!-- Shown when not on a Twitter profile page -->
<div id="not-twitter" class="not-twitter" style="display:none">
  Navigate to a Twitter / X profile page, then click the extension.
</div>

<!-- Main form — shown when on a Twitter profile page -->
<div id="main" class="body" style="display:none">

  <div class="screen-name" id="screen-name-label">@username</div>

  <div class="grid2">

    <div class="field">
      <label>
        Followers
        <span id="fol-badge" class="scraped-badge" style="display:none">✓ scraped</span>
      </label>
      <input type="number" id="followers_count" placeholder="0" min="0"/>
    </div>

    <div class="field">
      <label>
        Following
        <span id="fri-badge" class="scraped-badge" style="display:none">✓ scraped</span>
      </label>
      <input type="number" id="friends_count" placeholder="0" min="0"/>
    </div>

    <div class="field">
      <label>
        Total tweets
        <span id="stat-badge" class="scraped-badge" style="display:none">✓ scraped</span>
        <span id="statuses_count-est-badge" class="est-badge" style="display:none">~ estimated</span>
      </label>
      <input type="number" id="statuses_count" placeholder="0" min="0"/>
    </div>

    <div class="field">
      <label>
        Total likes given
        <span id="favourites_count-est-badge" class="est-badge" style="display:none">~ estimated</span>
      </label>
      <input type="number" id="favourites_count" placeholder="0" min="0"/>
    </div>

    <div class="field">
      <label>
        Listed count
        <span id="listed_count-est-badge" class="est-badge" style="display:none">~ estimated</span>
      </label>
      <input type="number" id="listed_count" placeholder="0" min="0"/>
    </div>

    <div class="field">
      <label>Account created</label>
      <input type="text" id="created_at" placeholder="e.g. 2020-01-15"/>
    </div>

  </div>

  <div class="checks">
    <label class="check-item">
      <input type="checkbox" id="has_description"/> Has bio
    </label>
    <label class="check-item">
      <input type="checkbox" id="has_url"/> Has URL
    </label>
    <label class="check-item">
      <input type="checkbox" id="has_location"/> Has location
    </label>
  </div>

  <button class="btn btn-scrape" id="scrape-btn">↻ Re-scrape from page</button>

  <button class="btn btn-suggest" id="suggest-btn">Suggest missing values</button>

  <p class="suggest-note" id="suggest-note"></p>

  <button class="btn btn-primary" id="analyse-btn">Analyse account</button>

  <div id="result-box" style="display:none"></div>

  <div class="error-box" id="error-box"></div>

  <p class="footer-note">
    Likes and listed count cannot be scraped from Twitter.<br/>
    Use "Suggest" for estimates or enter manually.
  </p>

</div>

<script src="popup.js"></script>
</body>
</html>
